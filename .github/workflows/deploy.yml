name: Deploy Laravel to cPanel

on:
  push:
    branches:
      - main # Triggers the deploy whenever you push to the main branch

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: 🔨 Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: 📦 Compile Assets (Vite)
      run: |
        npm install
        npm run build

    - name: 📂 Sync Files to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Exclude environment files and local nodes so you don't overwrite server configs
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.env
